sensor_name: visir/mersi-1

modifiers:
  rayleigh_corrected:
    modifier: !!python/name:satpy.modifiers.PSPRayleighReflectance
    atmosphere: us-standard
    aerosol_type: rayleigh_only
    prerequisites:
    - name: '3'
      modifiers: [sunz_corrected]
    optional_prerequisites:
    - name: satellite_azimuth_angle
    - name: satellite_zenith_angle
    - name: solar_azimuth_angle
    - name: solar_zenith_angle

  sunz_corrected:
    modifier: !!python/name:satpy.modifiers.SunZenithCorrector
    user_warning: >
      The reduction of the standard Sun zenith angle correction above 88 degrees will
      be removed in satpy v1.0 in order to compute the true reflectance with the
      'sunz_corrected' modifier. To avoid overcorrection at high angles for (RGB) imagery
      it's recommended to use the 'effective_solar_pathlength_corrected' modifier instead.
      If you still want to keep the current behaviour, please set the 'correction_limit'
      parameter to 88.0 and 'max_sza' to 95.0 in a local definition of the modifier.
    correction_limit: 88.0
    max_sza: 95.0
    prerequisites:
      - name: solar_zenith_angle

  nir_reflectance:
    modifier: !!python/name:satpy.modifiers.NIRReflectance
    prerequisites:
    - name: '24'
    optional_prerequisites:
    - solar_zenith_angle


composites:
  colorized_ir:
    compositor: !!python/name:satpy.composites.core.SingleBandCompositor
    prerequisites:
      - name: '5'
    standard_name: colorized_ir_clouds

  true_color:
    compositor: !!python/name:satpy.composites.core.GenericCompositor
    prerequisites:
      - name: '3'
        modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected]
      - name: '2'
        modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected]
      - name: '1'
        modifiers: [effective_solar_pathlength_corrected, rayleigh_corrected]
    standard_name: true_color

  true_color_uncorr:
    compositor: !!python/name:satpy.composites.core.GenericCompositor
    prerequisites:
      - name: '3'
        modifiers: [effective_solar_pathlength_corrected]
      - name: '2'
        modifiers: [effective_solar_pathlength_corrected]
      - name: '1'
        modifiers: [effective_solar_pathlength_corrected]
    standard_name: true_color

  natural_color:
    compositor: !!python/name:satpy.composites.resolution.RatioSharpenedRGB
    prerequisites:
      - name: '6'
        modifiers: [effective_solar_pathlength_corrected]
      - name: '16'
        modifiers: [effective_solar_pathlength_corrected]
      - name: '3'
        modifiers: [effective_solar_pathlength_corrected]
    optional_prerequisites:
      - name: '4'
        modifiers: [effective_solar_pathlength_corrected]
    high_resolution_band: green
    neutral_resolution_band: blue
    standard_name: natural_color

  overview:
    compositor: !!python/name:satpy.composites.core.GenericCompositor
    prerequisites:
      - name: '3'
        modifiers: [effective_solar_pathlength_corrected]
      - name: '4'
        modifiers: [effective_solar_pathlength_corrected]
      - name: '5'
    standard_name: overview
