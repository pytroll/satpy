    operations:
      - name: stretch
        method: !!python/name:satpy.enhancements.contrast.stretch
        kwargs:
          stretch: crude
          min_stretch: [280.7, 0, 1]
          max_stretch: [219.6, 78, 59]

  day_cloud_type:
    standard_name: day_cloud_type_distinction
    operations:
      - name: stretch
        method: !!python/name:satpy.enhancements.contrast.stretch
        kwargs:
          stretch: crude
          min_stretch: [0.0, 0.0, 1.0]
          max_stretch: [10.0, 78.0, 59.0]
      - name: gamma
        method: !!python/name:satpy.enhancements.contrast.gamma
        kwargs:
          gamma: [1.5, 1.0, 1.0]
