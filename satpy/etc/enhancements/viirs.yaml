  viirs_flames_colorised:
    standard_name: viirs_flames_colorised
    operations:
      - name: colorize
        method: !!python/name:satpy.enhancements.colormap.colorize
        kwargs:
          palettes:
            - { colors: ylorrd, min_value: 330, max_value: 430 , reverse: true}


  night_ir105:
